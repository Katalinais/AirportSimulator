<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador de Aeropuerto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f111a;
    --bg2: #161a26;
    --panel: #1c2130;
    --panel2: #232a3d;
    --edge: #0a0c14;
    --line: #313a52;
    --ink: #e7ecf6;
    --muted: #8b94ab;
    --amber: #ffce4d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, #1d2335 0%, var(--bg) 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', ui-monospace, monospace;
    min-height: 100%;
    display: flex;
    justify-content: center;
    padding: 22px 16px 40px;
  }
  .cab {
    width: 100%;
    max-width: 980px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ---- Topbar ---- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    padding: 2px 4px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    font-size: 22px; color: var(--amber);
    background: var(--panel); border: 2px solid var(--line);
    width: 40px; height: 40px; display: grid; place-items: center;
    box-shadow: 0 3px 0 var(--edge);
  }
  .logo-text { font-family: 'Press Start 2P', monospace; font-size: 15px; letter-spacing: .5px; }
  .legend { color: var(--muted); font-size: 12px; }

  /* ---- Tablero / pantalla ---- */
  .board-wrap { perspective: 1000px; padding: 4px 0 6px; }
  .board-shadow { transition: transform .35s ease; transform-origin: 50% 60%; }
  .board {
    background: linear-gradient(#2a3146, #1a2030);
    border: 4px solid #0a0d16;
    border-radius: 10px;
    padding: 12px;
    box-shadow:
      inset 0 0 0 2px #39435f,
      inset 0 2px 14px rgba(0,0,0,.55),
      0 18px 40px rgba(0,0,0,.5);
  }
  .screen {
    display: block; width: 100%; height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 4px;
    background: #1c2230;
    box-shadow: 0 0 0 3px #0a0d16, inset 0 0 24px rgba(0,0,0,.35);
  }

  /* ---- Controles ---- */
  .controls {
    display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: 0 4px 0 var(--edge);
  }
  .btn {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--ink); cursor: pointer;
    background: var(--panel2); border: 2px solid var(--line);
    border-radius: 7px; padding: 11px 12px;
    box-shadow: 0 3px 0 var(--edge);
    transition: transform .05s, background .15s;
  }
  .btn:hover { background: #2c344b; }
  .btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--edge); }
  .btn.primary { background: #2f6d5e; border-color: #3c8c78; color: #eafff8; }
  .btn.primary.on { background: #7a5a1e; border-color: #b58a33; color: #fff3d6; }
  .btn.ghost { background: transparent; color: var(--muted); }

  .seg, .slider-group { display: flex; align-items: center; gap: 7px; }
  .seg-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--muted); letter-spacing: .5px; }
  .segbtn {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    background: var(--bg2); color: var(--muted);
    border: 2px solid var(--line); border-radius: 6px;
    padding: 9px 8px; cursor: pointer;
  }
  .segbtn.active { background: var(--amber); color: #2a1f00; border-color: var(--amber); }

  .slider-group { flex: 1; min-width: 200px; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 8px;
    background: var(--bg2); border: 2px solid var(--line); border-radius: 6px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 18px; background: var(--amber);
    border: 2px solid #2a1f00; border-radius: 3px; cursor: pointer;
    box-shadow: 0 2px 0 var(--edge);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 16px; background: var(--amber);
    border: 2px solid #2a1f00; border-radius: 3px; cursor: pointer;
  }
  .slider-val {
    font-family: 'VT323', monospace; font-size: 24px; color: var(--amber);
    min-width: 34px; text-align: right; line-height: 1;
  }

  /* ---- Estadísticas ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
  }
  .stat {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 9px;
    padding: 10px 8px 8px;
    text-align: center;
    box-shadow: 0 4px 0 var(--edge);
  }
  .stat.wide { background: #221b16; border-color: #4a3a26; }
  .stat-num { font-family: 'VT323', monospace; font-size: 34px; line-height: .9; }
  .stat-label { font-family: 'Press Start 2P', monospace; font-size: 6.5px; color: var(--muted); margin-top: 6px; letter-spacing: .3px; }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(4, 1fr); }
    .logo-text { font-size: 12px; }
    .slider-group { min-width: 160px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Motor de simulación (JS plano) -->
  <script src="sim/engine.js"></script>
  <script src="sim/sprites.js"></script>
  <script src="sim/render.js"></script>

  <!-- Tweaks + App (JSX) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sim/app.jsx"></script>
</body>
</html>
